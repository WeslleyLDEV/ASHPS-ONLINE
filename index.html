// Adicione isso no seu <script> existente

async function buscarAssociados() {
    const termoBusca = document.querySelector('input[type="text"]').value;
    const tabelaBody = document.querySelector('#view-dashboard tbody');

    // Mostra carregando (opcional)
    tabelaBody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-slate-500">Buscando...</td></tr>';

    try {
        // Faz a chamada para o seu Back-end (API)
        const resposta = await fetch(`http://localhost:3000/api/associados?busca=${termoBusca}`);
        const associados = await resposta.json();

        // Limpa a tabela
        tabelaBody.innerHTML = '';

        // Se não encontrar ninguém
        if(associados.length === 0) {
            tabelaBody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-slate-500">Nenhum associado encontrado.</td></tr>';
            return;
        }

        // Preenche a tabela com os dados reais vindos do banco
        associados.forEach(associado => {
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-slate-50 transition-colors';
            
            // Aqui definimos a cor do status dinamicamente
            const statusClass = associado.status === 'Ativo' 
                ? 'bg-emerald-100 text-emerald-700' 
                : 'bg-amber-100 text-amber-700';

            tr.innerHTML = `
                <td class="px-6 py-4 font-semibold text-slate-900">${associado.matricula}</td>
                <td class="px-6 py-4">${associado.nome}</td>
                <td class="px-6 py-4 text-slate-500">${associado.lotacao}</td>
                <td class="px-6 py-4">${associado.plano}</td>
                <td class="px-6 py-4"><span class="px-2 py-1 ${statusClass} rounded-full text-xs font-bold">${associado.status}</span></td>
            `;
            tabelaBody.appendChild(tr);
        });

    } catch (error) {
        console.error("Erro ao buscar dados:", error);
        tabelaBody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-red-500">Erro ao conectar com o servidor.</td></tr>';
    }
}

// Escuta a digitação no input de busca para pesquisar automaticamente
document.addEventListener('DOMContentLoaded', () => {
    const inputBusca = document.querySelector('input[placeholder="Buscar por Nome, CPF ou Matrícula..."]');
    if(inputBusca) {
        // Usa debounce (espera o usuário parar de digitar por 500ms antes de buscar)
        let timeout = null;
        inputBusca.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(buscarAssociados, 500);
        });
    }
});
